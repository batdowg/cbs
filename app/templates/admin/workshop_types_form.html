{% extends "base.html" %}
{% block content %}
<h2>{{ 'Edit' if form.get('id') else 'Create' }} Workshop Type</h2>
{% if errors.get('form') %}<p style="color:red">{{ errors.form }}</p>{% endif %}
<form method="post">
  <div>
    <label>Code
      <input type="text" name="code" value="{{ form.code or '' }}" required pattern="[A-Z0-9]{2,8}" maxlength="8">
    </label>
    {% if errors.get('code') %}<span style="color:red">{{ errors.code }}</span>{% endif %}
  </div>
  <div>
    <label>Name
      <input type="text" name="name" value="{{ form.name or '' }}" required>
    </label>
  </div>
  <div>
    <button type="submit">Save</button>
  </div>
</form>
<p><a href="{{ url_for('workshop_types_list') }}">Back</a></p>
{% endblock %}
