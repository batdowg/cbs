{% extends "base.html" %}
{% block content %}
<h2>Workshop Types</h2>
<table border="1" cellpadding="4" cellspacing="0">
  <tr><th>Code</th><th>Name</th></tr>
  {% for id, code, name, active in rows %}
  <tr>
    <td>{{ code }}</td>
    <td>{{ name }}</td>
  </tr>
  {% else %}
  <tr><td colspan="2">No workshop types</td></tr>
  {% endfor %}
</table>
<p><a href="/">Back</a></p>
{% endblock %}
