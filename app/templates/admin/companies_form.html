{% extends "base.html" %}
{% block content %}
<h2>{{ 'Edit' if form.get('id') else 'Create' }} Company</h2>
{% if errors.get('form') %}<p style="color:red">{{ errors.form }}</p>{% endif %}
<form method="post">
  <div>
    <label>Name
      <input type="text" name="name" value="{{ form.name or '' }}" required>
    </label>
    {% if errors.get('name') %}<span style="color:red">{{ errors.name }}</span>{% endif %}
  </div>
  <div>
    <button type="submit">Save</button>
  </div>
</form>
<p><a href="{{ url_for('companies_list') }}">Back</a></p>
{% endblock %}
