{% extends "base.html" %}
{% block content %}
<h2>Companies</h2>
<table border="1" cellpadding="4" cellspacing="0">
  <tr><th>Name</th></tr>
  {% for id, name in rows %}
  <tr>
    <td>{{ name }}</td>
  </tr>
  {% else %}
  <tr><td>No companies</td></tr>
  {% endfor %}
</table>
<p><a href="/">Back</a></p>
{% endblock %}
